# NovaAttribute 默认属性定义
#
# 全局Lore匹配：自动根据属性 name（去色后）匹配Lore行
# 例如 name: "§c物理攻击" 自动匹配 "物理攻击: 100"、"物理攻击: +100万" 等
# 无需为每个属性单独写正则，特殊格式可用 lore-pattern 覆盖
#
# 支持的Lore格式:
#   属性名: 100          固定值
#   属性名: +100         带正号
#   属性名: (+100)       带括号
#   属性名: 10%          百分比（需配合 lore-divisor）
#   属性名: 100~200      范围值
#   属性名: +100(+10%)   基础值 + 百分比加成
#   属性名: 100万         带单位后缀

attributes:

  # ====== 攻击属性 ======

  physical_damage:
    name: "§c物理攻击"
    default: 1.0
    trigger: PASSIVE
